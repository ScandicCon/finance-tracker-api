services:
  db:
    image: postgres:16
    container_name: finance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: finance_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: finance_api
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./app/frontend
    container_name: finance_frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  postgres_data: